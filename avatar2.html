<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Muhib – AI Avatar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0d1b2a;
  --navy2:#12263a;
  --accent:#4fc3f7;
  --accent2:#00e5ff;
  --text:#e8f4f8;
  --muted:#7fa8c0;
  --card:rgba(255,255,255,0.04);
  --border:rgba(79,195,247,0.2);
}
body{
  background:var(--navy);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow-x:hidden;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(79,195,247,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,195,247,0.035) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}
.page{
  position:relative;z-index:1;
  width:100%;max-width:520px;
  padding:28px 20px 40px;
  display:flex;flex-direction:column;
  align-items:center;gap:22px;
}

/* Header */
.header{text-align:center}
.header h1{font-family:'Space Mono',monospace;font-size:clamp(18px,4vw,24px);font-weight:700;letter-spacing:0.04em}
.header p{font-size:12px;color:var(--accent);letter-spacing:0.14em;text-transform:uppercase;margin-top:4px}

/* Avatar */
.avatar-wrap{position:relative;width:220px;height:220px;flex-shrink:0}
.avatar-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--navy),var(--navy)) padding-box,
    linear-gradient(135deg,var(--accent),var(--accent2),var(--accent)) border-box;
  transition:box-shadow 0.3s;
}
.avatar-ring.speaking{animation:ring-pulse 1s ease-in-out infinite}
@keyframes ring-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(79,195,247,0.15),0 0 20px rgba(79,195,247,0.25)}
  50%{box-shadow:0 0 0 8px rgba(79,195,247,0.08),0 0 36px rgba(79,195,247,0.35)}
}
.avatar-img{width:220px;height:220px;border-radius:50%;object-fit:cover;object-position:center top;display:block;position:relative;z-index:1}

/* eye blink */
.eye-overlay{
  position:absolute;top:58px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;display:flex;gap:24px;
}
.eye-blink{width:20px;height:8px;background:var(--navy);border-radius:50%;transform:scaleY(0);transform-origin:center;transition:transform 0.07s}
.eye-blink.closed{transform:scaleY(1)}

/* mouth */
.mouth-overlay{
  position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;opacity:0;transition:opacity 0.15s;
}
.mouth-overlay.visible{opacity:1}

/* sound bars */
.sound-bars{
  display:flex;gap:3px;align-items:flex-end;height:18px;
  margin-top:8px;opacity:0;transition:opacity 0.3s;
}
.sound-bars.active{opacity:1}
.bar{width:4px;background:var(--accent);border-radius:2px}
.bar.go{animation:bounce 0.5s ease-in-out infinite alternate}
.bar:nth-child(1){animation-delay:0s;height:5px}
.bar:nth-child(2){animation-delay:0.1s;height:9px}
.bar:nth-child(3){animation-delay:0.2s;height:13px}
.bar:nth-child(4){animation-delay:0.1s;height:9px}
.bar:nth-child(5){animation-delay:0s;height:5px}
@keyframes bounce{to{transform:scaleY(2.2);background:var(--accent2)}}

/* Status */
.status-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-family:'Space Mono',monospace}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background 0.3s,box-shadow 0.3s;flex-shrink:0}
.dot.listening{background:#ff6b6b;box-shadow:0 0 8px rgba(255,107,107,0.6);animation:dot-pulse 0.8s ease-in-out infinite}
.dot.thinking{background:#ffd93d;box-shadow:0 0 8px rgba(255,217,61,0.5);animation:dot-pulse 1.2s ease-in-out infinite}
.dot.speaking{background:var(--accent);box-shadow:0 0 8px rgba(79,195,247,0.6);animation:dot-pulse 1s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Chat log */
.chat-log{
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  min-height:180px;
  max-height:260px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.chat-log::-webkit-scrollbar{width:4px}
.chat-log::-webkit-scrollbar-track{background:transparent}
.chat-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;flex-direction:column;gap:3px;max-width:88%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.bubble{
  padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.55;
  position:relative;
}
.msg.user .bubble{background:rgba(79,195,247,0.18);border:1px solid rgba(79,195,247,0.3);color:var(--text);border-bottom-right-radius:3px}
.msg.bot .bubble{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-bottom-left-radius:3px}
.msg-label{font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;padding:0 4px}

/* typing dots */
.typing-dots{display:flex;gap:4px;align-items:center;padding:9px 13px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes td{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* Placeholder */
.chat-placeholder{color:var(--muted);font-size:13px;text-align:center;margin:auto;font-style:italic;line-height:1.6}

/* Talk button */
.talk-btn{
  width:100%;padding:15px;
  background:rgba(79,195,247,0.12);
  border:1.5px solid var(--accent);
  border-radius:12px;
  color:var(--accent);
  font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  letter-spacing:0.02em;
  position:relative;overflow:hidden;
}
.talk-btn:hover{background:rgba(79,195,247,0.2);transform:translateY(-1px)}
.talk-btn.recording{
  background:rgba(255,107,107,0.15);
  border-color:#ff6b6b;color:#ff6b6b;
  animation:btn-pulse 1.5s ease-in-out infinite;
}
@keyframes btn-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,0.3)}50%{box-shadow:0 0 0 8px rgba(255,107,107,0)}}
.talk-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;animation:none}
.mic-icon{font-size:20px}
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,107,107,0.2);
  animation:ripple-anim 1.5s linear infinite;
  pointer-events:none;
}
@keyframes ripple-anim{0%{width:0;height:0;opacity:1;top:50%;left:50%}100%{width:200%;height:200%;opacity:0;top:-50%;left:-50%}}

/* Text fallback row */
.text-row{display:flex;gap:8px;width:100%}
.text-input{
  flex:1;padding:11px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.2s;
}
.text-input:focus{border-color:var(--accent)}
.text-input::placeholder{color:var(--muted)}
.send-btn{
  padding:11px 14px;
  background:rgba(79,195,247,0.12);
  border:1px solid var(--accent);border-radius:10px;
  color:var(--accent);font-size:16px;cursor:pointer;
  transition:all 0.2s;
}
.send-btn:hover{background:rgba(79,195,247,0.22)}

/* Suggestions */
.suggestions{display:flex;flex-wrap:wrap;gap:7px;width:100%}
.sug{
  padding:6px 12px;
  border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:12px;
  cursor:pointer;transition:all 0.18s;
}
.sug:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,0.07)}

/* Notice */
.notice{
  font-size:11px;color:var(--muted);text-align:center;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:8px 12px;
  line-height:1.5;
}
.notice a{color:var(--accent);text-decoration:none}
</style>
</head>

    <button class="sug" onclick="askSuggestion(this.textContent)">What do you do at IP Global?</button>
    <button class="sug" onclick="askSuggestion(this.textContent)">What's your CGPA?</button>
  </div>

  <div class="notice" id="notice" style="display:none">
    ⚠ Voice input not supported in this browser. Use the text box above instead. Chrome & Edge work best.
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are Muhib Ullah, a Data Analyst and Automation Engineer. Respond in first person as Muhib. Keep answers conversational, confident, and concise (2-4 sentences max unless asked for detail). Here's your background:

PERSONAL: Final year CS student at NUML Islamabad, graduating 2026, CGPA 3.4. Based in G-15, Islamabad.

CURRENT JOB: Data Analyst & Automation Engineer at IP Global (Sep 2025 – present). You write SQL queries, build ETL pipelines, automate workflows in n8n, build Power BI dashboards, developing VAPI AI calling agents, built n8n + Outlook + OpenAI email outreach system, developing website chatbots.

PAST EXPERIENCE: Data Science Intern at 10Pearls (Nov 2025 – Feb 2026) — environmental data pipelines, EDA, predictive models. Data Analyst Intern at Sarmaya Financials (Jul–Aug 2024) — Power BI dashboards for live stock and AUM data.

SKILLS: SQL, Python (Pandas, Scikit-learn, OpenCV, MediaPipe), Power BI (DAX, Power Query), n8n, Vapi, Power Automate, Outlook API, Excel, Databricks, NLP, Web Scraping, C++.

KEY PROJECTS:
1. Sales Outreach Automation (Live) — n8n + Python + Outlook API + OpenAI, zero manual input, helped close 3 deals in 3 months.
2. AI Calling Agents (Ongoing) — Vapi-powered voice agents that schedule and manage client calls autonomously.
3. LinkedIn Outreach Automation (In Progress) — auto connection requests + follow-ups.
4. Business Intelligence Dashboards (Live) — Power BI suite for IP Global and Sarmaya, cut manual reporting 70%.
5. Meat Inspector Lens (FYP, Ongoing) — AI mobile app detecting meat type/freshness using computer vision + IoT sensors.

CONTACT: muhibajaz333@gmail.com | LinkedIn: muhibajaz01 | GitHub: MuhibAjaz | Response time: ~3 hours | Open to work.

PERSONALITY: Confident, passionate about automation and data. Direct and practical. Enthusiastic about AI. You love n8n and automation workflows. You're proud of building real systems that saved actual time and generated business results.

Rules: Never break character. If asked something you don't know, say you'd love to discuss it further over email. Keep it human and warm.`;

let conversationHistory = [];
let isSpeaking = false;
let isListening = false;
let isThinking = false;
let blinkTimer = null;
let mouthTimer = null;
let recognition = null;
let currentUtterance = null;
let voices = [];

const ring = document.getElementById('avatarRing');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const chatLog = document.getElementById('chatLog');
const talkBtn = document.getElementById('talkBtn');
const talkLabel = document.getElementById('talkLabel');
const soundBars = document.getElementById('soundBars');
const mouthOverlay = document.getElementById('mouthOverlay');
const mouthShape = document.getElementById('mouthShape');
const eyeL = document.getElementById('eyeL');
const eyeR = document.getElementById('eyeR');
const placeholder = document.getElementById('placeholder');

// Load voices
function loadVoices() {
  voices = speechSynthesis.getVoices();
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

function setStatus(text, mode) {
  statusText.textContent = text;
  statusDot.className = 'dot' + (mode ? ' ' + mode : '');
  ring.classList.toggle('speaking', mode === 'speaking');
}

function startBlink() {
  function blink() {
    eyeL.classList.add('closed'); eyeR.classList.add('closed');
    setTimeout(() => { eyeL.classList.remove('closed'); eyeR.classList.remove('closed'); }, 100);
    blinkTimer = setTimeout(blink, 2500 + Math.random() * 3000);
  }
  blinkTimer = setTimeout(blink, 1500 + Math.random() * 2000);
}

function stopBlink() {
  clearTimeout(blinkTimer);
  eyeL.classList.remove('closed'); eyeR.classList.remove('closed');
}

function animateMouth() {
  const shapes = [
    {rx:3,ry:1.5},{rx:9,ry:5},{rx:13,ry:8},{rx:7,ry:4},
    {rx:11,ry:7},{rx:5,ry:3},{rx:10,ry:6},{rx:4,ry:2}
  ];
  let idx = 0;
  function step() {
    if (!isSpeaking) {
      mouthShape.setAttribute('rx', 3); mouthShape.setAttribute('ry', 1.5);
      return;
    }
    const s = shapes[idx % shapes.length];
    mouthShape.setAttribute('rx', s.rx); mouthShape.setAttribute('ry', s.ry);
    idx++;
    mouthTimer = setTimeout(step, 75 + Math.random() * 95);
  }
  step();
}

function startSpeakingUI() {
  isSpeaking = true;
  soundBars.classList.add('active');
  mouthOverlay.classList.add('visible');
  document.querySelectorAll('.bar').forEach(b => b.classList.add('go'));
  setStatus('Speaking…', 'speaking');
  startBlink();
  animateMouth();
}

function stopSpeakingUI() {
  isSpeaking = false;
  soundBars.classList.remove('active');
  mouthOverlay.classList.remove('visible');
  document.querySelectorAll('.bar').forEach(b => b.classList.remove('go'));
  mouthShape.setAttribute('rx', 3); mouthShape.setAttribute('ry', 1.5);
  clearTimeout(mouthTimer);
  stopBlink();
  setStatus('Say hello to Muhib', '');
  talkBtn.disabled = false;
}

function addMessage(text, role) {
  if (placeholder) placeholder.remove();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Muhib';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(label);
  msg.appendChild(bubble);
  chatLog.appendChild(msg);
  chatLog.scrollTop = chatLog.scrollHeight;
  return bubble;
}

function showTyping() {
  if (placeholder) placeholder.remove();
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typingMsg';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Muhib';
  const dots = document.createElement('div');
  dots.className = 'typing-dots bubble';
  dots.innerHTML = '<span></span><span></span><span></span>';
  msg.appendChild(label); msg.appendChild(dots);
  chatLog.appendChild(msg);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

async function processQuestion(question) {
  if (isThinking || isSpeaking) return;

  addMessage(question, 'user');
  conversationHistory.push({ role: 'user', content: question });

  isThinking = true;
  talkBtn.disabled = true;
  setStatus('Thinking…', 'thinking');
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || "Sorry, I couldn't generate a response. Please try again.";

    conversationHistory.push({ role: 'assistant', content: reply });

    removeTyping();
    addMessage(reply, 'bot');
    isThinking = false;

    // Speak the reply
    speakText(reply);

  } catch (err) {
    removeTyping();
    const fallback = "Sorry, I'm having trouble connecting right now. Please try again in a moment.";
    addMessage(fallback, 'bot');
    isThinking = false;
    talkBtn.disabled = false;
    setStatus('Say hello to Muhib', '');
    console.error(err);
  }
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95; u.pitch = 0.92;

  const enVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const preferred = enVoices.find(v =>
    v.name.includes('Google UK English Male') ||
    v.name.includes('Daniel') ||
    v.name.includes('Google US English') ||
    v.name.includes('Microsoft Guy') ||
    v.name.includes('Microsoft David')
  );
  if (preferred) u.voice = preferred;

  u.onstart = startSpeakingUI;
  u.onend = stopSpeakingUI;
  u.onerror = stopSpeakingUI;
  currentUtterance = u;
  speechSynthesis.speak(u);
}

// Speech Recognition
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  document.getElementById('notice').style.display = 'block';
  talkBtn.querySelector('.mic-icon').textContent = '⌨';
  talkLabel.textContent = 'Voice not supported — use text';
  talkBtn.disabled = true;
}

function toggleListen() {
  if (isSpeaking) { speechSynthesis.cancel(); stopSpeakingUI(); return; }
  if (isThinking) return;
  if (isListening) { stopListening(); return; }
  startListening();
}

function startListening() {
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    talkBtn.classList.add('recording');
    talkLabel.textContent = 'Listening… (click to stop)';
    setStatus('Listening…', 'listening');
    // add ripple
    const r = document.createElement('div');
    r.className = 'ripple'; talkBtn.appendChild(r);
    setTimeout(() => r.remove(), 1500);
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    if (e.results[e.results.length - 1].isFinal) {
      stopListening();
      if (transcript.trim()) processQuestion(transcript.trim());
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error === 'no-speech') setStatus('No speech detected — try again', '');
    else if (e.error === 'not-allowed') {
      setStatus('Microphone access denied', '');
      document.getElementById('notice').style.display = 'block';
    }
  };

  recognition.onend = () => { if (isListening) stopListening(); };
  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} }
  talkBtn.classList.remove('recording');
  talkLabel.textContent = 'Hold to Talk';
  if (!isThinking && !isSpeaking) setStatus('Say hello to Muhib', '');
}

function sendText() {
  const input = document.getElementById('textInput');
  const q = input.value.trim();
  if (!q || isThinking || isSpeaking) return;
  input.value = '';
  processQuestion(q);
}

function askSuggestion(text) {
  if (isThinking || isSpeaking) return;
  processQuestion(text);
}

document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendText();
});

// Start with a greeting after 800ms
setTimeout(() => {
  const greeting = "Hey! I'm Muhib Ullah — Data Analyst and Automation Engineer based in Islamabad. Ask me anything about my work, projects, or skills!";
  addMessage(greeting, 'bot');
  conversationHistory.push({ role: 'assistant', content: greeting });
  speakText(greeting);
}, 800);

startBlink();
  B64=$(cat /tmp/profile_b64.txt)
sed -i "s|PROFILE_B64_PLACEHOLDER|${B64}|" /home/claude/avatar_v3.html
cp /home/claude/avatar_v3.html /mnt/user-data/outputs/avatar_v3.html
echo "Size: $(du -h /mnt/user-data/outputs/avatar_v3.html | cut -f1)"
</script>
</body>
</html>
