<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Muhib – AI Avatar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0d1b2a;
  --navy2:#12263a;
  --accent:#4fc3f7;
  --accent2:#00e5ff;
  --text:#e8f4f8;
  --muted:#7fa8c0;
  --card:rgba(255,255,255,0.04);
  --border:rgba(79,195,247,0.2);
}
body{
  background:var(--navy);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow-x:hidden;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(79,195,247,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,195,247,0.035) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}
.page{
  position:relative;z-index:1;
  width:100%;max-width:520px;
  padding:28px 20px 40px;
  display:flex;flex-direction:column;
  align-items:center;gap:22px;
}

/* Header */
.header{text-align:center}
.header h1{font-family:'Space Mono',monospace;font-size:clamp(18px,4vw,24px);font-weight:700;letter-spacing:0.04em}
.header p{font-size:12px;color:var(--accent);letter-spacing:0.14em;text-transform:uppercase;margin-top:4px}

/* Avatar */
.avatar-wrap{position:relative;width:220px;height:220px;flex-shrink:0}
.avatar-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--navy),var(--navy)) padding-box,
    linear-gradient(135deg,var(--accent),var(--accent2),var(--accent)) border-box;
  transition:box-shadow 0.3s;
}
.avatar-ring.speaking{animation:ring-pulse 1s ease-in-out infinite}
@keyframes ring-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(79,195,247,0.15),0 0 20px rgba(79,195,247,0.25)}
  50%{box-shadow:0 0 0 8px rgba(79,195,247,0.08),0 0 36px rgba(79,195,247,0.35)}
}
#avatarCanvas{
  width:220px;
  height:220px;
  border-radius:50%;
  display:block;
  position:relative;
  z-index:2;
  background:var(--navy);
}

/* sound bars */
.sound-bars{
  display:flex;gap:3px;align-items:flex-end;height:18px;
  margin-top:8px;opacity:0;transition:opacity 0.3s;
}
.sound-bars.active{opacity:1}
.bar{width:4px;background:var(--accent);border-radius:2px}
.bar.go{animation:bounce 0.5s ease-in-out infinite alternate}
.bar:nth-child(1){animation-delay:0s;height:5px}
.bar:nth-child(2){animation-delay:0.1s;height:9px}
.bar:nth-child(3){animation-delay:0.2s;height:13px}
.bar:nth-child(4){animation-delay:0.1s;height:9px}
.bar:nth-child(5){animation-delay:0s;height:5px}
@keyframes bounce{to{transform:scaleY(2.2);background:var(--accent2)}}

/* Status */
.status-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-family:'Space Mono',monospace}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background 0.3s,box-shadow 0.3s;flex-shrink:0}
.dot.listening{background:#ff6b6b;box-shadow:0 0 8px rgba(255,107,107,0.6);animation:dot-pulse 0.8s ease-in-out infinite}
.dot.thinking{background:#ffd93d;box-shadow:0 0 8px rgba(255,217,61,0.5);animation:dot-pulse 1.2s ease-in-out infinite}
.dot.speaking{background:var(--accent);box-shadow:0 0 8px rgba(79,195,247,0.6);animation:dot-pulse 1s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Chat log */
.chat-log{
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  min-height:180px;
  max-height:260px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.chat-log::-webkit-scrollbar{width:4px}
.chat-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:3px;max-width:88%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.bubble{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.msg.user .bubble{background:rgba(79,195,247,0.18);border:1px solid rgba(79,195,247,0.3);color:var(--text);border-bottom-right-radius:3px}
.msg.bot .bubble{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-bottom-left-radius:3px}
.msg-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:0 4px}
.typing-dots{display:flex;gap:4px;align-items:center;padding:9px 13px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.chat-placeholder{color:var(--muted);font-size:13px;text-align:center;margin:auto;font-style:italic;line-height:1.6}

.talk-btn{width:100%;padding:15px;background:rgba(79,195,247,0.12);border:1.5px solid var(--accent);border-radius:12px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}
.talk-btn:hover{background:rgba(79,195,247,0.2);transform:translateY(-1px)}
.talk-btn.recording{background:rgba(255,107,107,0.15);border-color:#ff6b6b;color:#ff6b6b;animation:btn-pulse 1.5s ease-in-out infinite}
@keyframes btn-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,0.3)}50%{box-shadow:0 0 0 8px rgba(255,107,107,0)}}
.talk-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;animation:none}
.text-row{display:flex;gap:8px;width:100%}
.text-input{flex:1;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.text-input:focus{border-color:var(--accent)}
.text-input::placeholder{color:var(--muted)}
.send-btn{padding:11px 14px;background:rgba(79,195,247,0.12);border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-size:16px;cursor:pointer;transition:all .2s}
.send-btn:hover{background:rgba(79,195,247,0.22)}
.suggestions{display:flex;flex-wrap:wrap;gap:7px;width:100%}
.sug{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s}
.sug:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,0.07)}
.notice{font-size:11px;color:var(--muted);text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;line-height:1.5}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="page">
  <div class="header">
    <h1>Muhib Ullah</h1>
    <p>Data Analyst &amp; Automation Engineer</p>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="avatar-wrap">
      <div class="avatar-ring" id="avatarRing"></div>
      <canvas id="avatarCanvas" width="400" height="400"></canvas>

    <div class="sound-bars" id="soundBars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>

    <div class="status-row">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Say hello to Muhib</span>

  <div class="chat-log" id="chatLog">
    <div class="chat-placeholder" id="placeholder">

  <button class="talk-btn" id="talkBtn">

  <div class="text-row">

    <button class="send-btn" onclick="sendText()">▶</button>

  <div class="suggestions">

  <div class="notice" id="notice" style="display:none">⚠ Voice not supported. Use Chrome or Edge, or type below.</div>
</div>

  ctx.beginPath();
  ctx.moveTo(FACE.mouthLeft.x, FACE.mouthLeft.y);
  ctx.quadraticCurveTo(centerX - 8, FACE.mouthTopY - 2 + openFactor, centerX, FACE.mouthTopY - 1);
  ctx.quadraticCurveTo(centerX + 8, FACE.mouthTopY - 2 + openFactor, FACE.mouthRight.x, FACE.mouthRight.y);
  ctx.fillStyle = '#c2856e';
  ctx.fill();
  
  // Lower lip
  ctx.beginPath();
  ctx.moveTo(FACE.mouthLeft.x, FACE.mouthLeft.y);
  ctx.quadraticCurveTo(centerX - 8, FACE.mouthBottomY + mouthYOffset, centerX, FACE.mouthBottomY + mouthYOffset + 2);
  ctx.quadraticCurveTo(centerX + 8, FACE.mouthBottomY + mouthYOffset, FACE.mouthRight.x, FACE.mouthRight.y);
  ctx.fillStyle = '#a86b57';
  ctx.fill();
  
  // --- Draw eye blink ---
  if (blinkProgress > 0.05) {
    ctx.fillStyle = `rgba(80, 65, 55, ${Math.min(1, blinkProgress * 1.5)})`;
    ctx.beginPath();
    ctx.ellipse(FACE.leftEye.x, FACE.leftEye.y, FACE.leftEye.w/1.8, FACE.leftEye.h/1.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(FACE.rightEye.x, FACE.rightEye.y, FACE.rightEye.w/1.8, FACE.rightEye.h/1.2, 0, 0, Math.PI*2);
    ctx.fill();
  }
  
  requestAnimationFrame(drawAvatar);
}

// Smooth mouth animation loop
function animateMouthLoop() {
  mouthOpen += (targetMouth - mouthOpen) * 0.25;
  requestAnimationFrame(animateMouthLoop);
}
animateMouthLoop();

// Random eye blinking
function scheduleBlink() {
  setInterval(() => {
    blinkProgress = 1;
    setTimeout(() => { blinkProgress = 0; }, 100);
  }, 3000 + Math.random() * 3000);
}
scheduleBlink();

photo.onload = () => drawAvatar();
drawAvatar();

// Start/stop mouth movement based on speech
let mouthAnimInterval = null;
function startMouthAnimation() {
  if (mouthAnimInterval) clearInterval(mouthAnimInterval);
  mouthAnimInterval = setInterval(() => {
    if (isSpeakingAnim) {
      targetMouth = 0.3 + Math.random() * 0.65;
    } else {
      targetMouth = 0;
    }
  }, 85);
}
function stopMouthAnimation() {
  if (mouthAnimInterval) clearInterval(mouthAnimInterval);
  mouthAnimInterval = null;
  targetMouth = 0;
}

// ============================================================
// AI + SPEECH SYSTEM
// ============================================================

const SYSTEM_PROMPT = `You are Muhib Ullah, a Data Analyst and Automation Engineer. Respond in first person as Muhib. Keep answers conversational, confident, and concise (2-4 sentences max unless asked for detail).

PERSONAL: Final year CS student at NUML Islamabad, graduating 2026, CGPA 3.4. Based in G-15, Islamabad.
CURRENT JOB: Data Analyst & Automation Engineer at IP Global (Sep 2025–present). SQL queries, ETL pipelines, n8n automation, Power BI dashboards, VAPI AI calling agents, n8n+Outlook+OpenAI email outreach, website chatbots.
PAST: Data Science Intern at 10Pearls (Nov 2025–Feb 2026) — environmental data pipelines, EDA, predictive models. Data Analyst Intern at Sarmaya Financials (Jul–Aug 2024) — Power BI dashboards for live stock and AUM data.
SKILLS: SQL, Python (Pandas, Scikit-learn, OpenCV, MediaPipe), Power BI (DAX, Power Query), n8n, Vapi, Power Automate, Outlook API, Excel, Databricks, NLP, Web Scraping, C++.
PROJECTS: 1) Sales Outreach Automation (Live) — n8n+Python+Outlook API+OpenAI, helped close 3 deals in 3 months. 2) AI Calling Agents (Ongoing) — Vapi voice agents. 3) LinkedIn Outreach Automation (In Progress). 4) BI Dashboards (Live) — cut manual reporting 70%. 5) Meat Inspector Lens (FYP) — AI app detecting meat type/freshness using computer vision+IoT.
CONTACT: muhibajaz333@gmail.com | LinkedIn: muhibajaz01 | GitHub: MuhibAjaz | ~3 hours response | Open to work.
PERSONALITY: Confident, passionate about automation. Direct, practical. Loves n8n. Proud of real results.
Rules: Never break character. Keep it human and warm. Short answers unless asked for detail.`;

let conversationHistory = [];
let isListening = false, isTalking = false, isThinking = false;
let recognition = null;

const ring = document.getElementById('avatarRing');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const chatLog = document.getElementById('chatLog');
const talkBtn = document.getElementById('talkBtn');
const talkLabel = document.getElementById('talkLabel');
const soundBars = document.getElementById('soundBars');
const placeholder = document.getElementById('placeholder');

function setStatus(text, mode) {
  statusText.textContent = text;
  statusDot.className = 'dot' + (mode ? ' ' + mode : '');
  ring.classList.toggle('speaking', mode === 'speaking');
}

function startSpeakingUI() {
  isSpeakingAnim = true;
  isTalking = true;
  soundBars.classList.add('active');
  document.querySelectorAll('.bar').forEach(b => b.classList.add('go'));
  setStatus('Speaking…', 'speaking');
  startMouthAnimation();
}

function stopSpeakingUI() {
  isSpeakingAnim = false;
  isTalking = false;
  soundBars.classList.remove('active');
  document.querySelectorAll('.bar').forEach(b => b.classList.remove('go'));
  stopMouthAnimation();
  setStatus('Say hello to Muhib', '');
  talkBtn.disabled = false;
}

function addMessage(text, role) {
  if (placeholder) placeholder.remove();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Muhib';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(label); msg.appendChild(bubble);
  chatLog.appendChild(msg);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function showTyping() {
  if (placeholder) placeholder.remove();
  const msg = document.createElement('div');
  msg.className = 'msg bot'; msg.id = 'typingMsg';
  const label = document.createElement('div');
  label.className = 'msg-label'; label.textContent = 'Muhib';
  const dots = document.createElement('div');
  dots.className = 'typing-dots bubble';
  dots.innerHTML = '<span></span><span></span><span></span>';
  msg.appendChild(label); msg.appendChild(dots);
  chatLog.appendChild(msg);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

async function processQuestion(question) {
  if (isThinking || isTalking) return;
  addMessage(question, 'user');
  conversationHistory.push({ role: 'user', content: question });
  isThinking = true;
  talkBtn.disabled = true;
  setStatus('Thinking…', 'thinking');
  showTyping();
  
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry, connection issue. Please try again.";
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage(reply, 'bot');
    isThinking = false;
    speakText(reply);
  } catch (err) {
    removeTyping();
    addMessage("Sorry, I'm having trouble connecting right now.", 'bot');
    isThinking = false;
    talkBtn.disabled = false;
    setStatus('Say hello to Muhib', '');
  }
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95; u.pitch = 0.92;
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const pref = voices.find(v =>
    v.name.includes('Google UK English Male') || v.name.includes('Daniel') ||
    v.name.includes('Google US English') || v.name.includes('Microsoft Guy') || v.name.includes('Microsoft David')
  );
  if (pref) u.voice = pref;
  u.onstart = startSpeakingUI;
  u.onend = stopSpeakingUI;
  u.onerror = stopSpeakingUI;
  speechSynthesis.speak(u);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  document.getElementById('notice').style.display = 'block';
  talkLabel.textContent = 'Voice not supported — use text';
  talkBtn.disabled = true;
}

function toggleListen() {
  if (isTalking) { speechSynthesis.cancel(); stopSpeakingUI(); return; }
  if (isThinking) return;
  if (isListening) { stopListening(); return; }
  startListening();
}

function startListening() {
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.onstart = () => {
    isListening = true;
    talkBtn.classList.add('recording');
    talkLabel.textContent = 'Listening… (click to stop)';
    setStatus('Listening…', 'listening');
  };
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    if (e.results[e.results.length - 1].isFinal) {
      stopListening();
      if (t.trim()) processQuestion(t.trim());
    }
  };
  recognition.onerror = (e) => {
    stopListening();
    if (e.error === 'no-speech') setStatus('No speech detected', '');
    else if (e.error === 'not-allowed') {
      setStatus('Mic access denied', '');
      document.getElementById('notice').style.display = 'block';
    }
  };
  recognition.onend = () => { if (isListening) stopListening(); };
  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} }
  talkBtn.classList.remove('recording');
  talkLabel.textContent = 'Hold to Talk';
  if (!isThinking && !isTalking) setStatus('Say hello to Muhib', '');
}

function sendText() {
  const q = document.getElementById('textInput').value.trim();
  if (!q || isThinking || isTalking) return;
  document.getElementById('textInput').value = '';
  processQuestion(q);
}

function askSuggestion(text) {
  if (isThinking || isTalking) return;
  processQuestion(text);
}

document.getElementById('textInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });
document.getElementById('talkBtn').addEventListener('click', toggleListen);

// Greeting
setTimeout(() => {
  const greet = "Hey! I'm Muhib Ullah — Data Analyst and Automation Engineer based in Islamabad. Ask me anything about my work, projects, or skills!";
  addMessage(greet, 'bot');
  conversationHistory.push({ role: 'assistant', content: greet });
  speakText(greet);
}, 800);
</script>
