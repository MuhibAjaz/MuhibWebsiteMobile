<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Muhib Ullah • AI Voice Avatar</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0c15;
  --card: #111827;
  --accent: #2dd4bf;
  --accent-glow: #14b8a6;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
}

body {
  background: radial-gradient(circle at 30% 10%, #0f172a, #020617);
  font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  width: 100%;
  background: rgba(17, 24, 39, 0.7);
  backdrop-filter: blur(16px);
  border-radius: 48px;
  border: 1px solid rgba(45, 212, 191, 0.3);
  padding: 28px 24px 32px;
  box-shadow: 0 25px 40px rgba(0,0,0,0.5);
}

.avatar-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
  position: relative;
}

.avatar-ring {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2dd4bf, #3b82f6);
  padding: 3px;
  transition: box-shadow 0.2s;
}

.avatar-ring.speaking {
  animation: glowPulse 0.9s infinite alternate;
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 0 0 rgba(45,212,191,0.4); }
  100% { box-shadow: 0 0 0 8px rgba(45,212,191,0.1); }
}

canvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  display: block;
  background: #0f172a;
}

.status-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin: 12px 0 20px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #475569;
  transition: all 0.2s;
}

.dot.active-speaking { background: #2dd4bf; box-shadow: 0 0 8px #2dd4bf; animation: pulse 0.8s infinite; }
.dot.active-listening { background: #f97316; box-shadow: 0 0 8px #f97316; animation: pulse 0.9s infinite; }
.dot.active-thinking { background: #eab308; box-shadow: 0 0 8px #eab308; animation: pulse 1s infinite; }

@keyframes pulse { 0%,100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } }

.wave-group {
  display: flex;
  gap: 4px;
  align-items: flex-end;
  height: 24px;
}
.wave-group span {
  width: 3px;
  background: #2dd4bf;
  border-radius: 2px;
  transition: height 0.05s ease;
  height: 6px;
}

.chat-box {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 28px;
  padding: 16px;
  height: 240px;
  overflow-y: auto;
  margin: 16px 0;
  border: 1px solid rgba(45,212,191,0.2);
}

.message {
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
}
.message.user { align-items: flex-end; }
.message.bot { align-items: flex-start; }
.bubble {
  max-width: 85%;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  line-height: 1.45;
}
.user .bubble {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border: 1px solid #2dd4bf40;
  border-bottom-right-radius: 5px;
}
.bot .bubble {
  background: #1e293b;
  border: 1px solid #334155;
  border-bottom-left-radius: 5px;
}
.msg-label {
  font-size: 0.65rem;
  color: #94a3b8;
  margin-bottom: 4px;
  margin-left: 8px;
}

.typing-dots {
  display: flex;
  gap: 5px;
  padding: 8px 16px;
}
.typing-dots span {
  width: 6px;
  height: 6px;
  background: #94a3b8;
  border-radius: 50%;
  animation: typingAnim 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingAnim { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

.talk-btn {
  width: 100%;
  background: rgba(45,212,191,0.12);
  border: 1.5px solid #2dd4bf;
  border-radius: 60px;
  padding: 14px;
  font-weight: 700;
  font-size: 1rem;
  color: #2dd4bf;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
  margin-bottom: 16px;
}
.talk-btn.recording {
  background: rgba(249,115,22,0.2);
  border-color: #f97316;
  color: #f97316;
  animation: btnPulse 1s infinite;
}
@keyframes btnPulse { 0% { box-shadow: 0 0 0 0 #f9731650; } 100% { box-shadow: 0 0 0 8px transparent; } }

.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.input-row input {
  flex: 1;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 40px;
  padding: 12px 18px;
  color: white;
  font-family: inherit;
  outline: none;
}
.input-row input:focus { border-color: #2dd4bf; }
.input-row button {
  background: #2dd4bf20;
  border: 1px solid #2dd4bf;
  border-radius: 40px;
  padding: 0 20px;
  color: #2dd4bf;
  font-weight: bold;
  cursor: pointer;
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.sug-chip {
  background: rgba(45,212,191,0.08);
  border: 1px solid rgba(45,212,191,0.3);
  border-radius: 30px;
  padding: 6px 14px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: 0.1s;
}
.sug-chip:hover { background: #2dd4bf20; border-color: #2dd4bf; }

.mic-error {
  color: #f97316;
  font-size: 0.7rem;
  text-align: center;
  margin-top: 8px;
  display: none;
}
</style>
</head>

      ctx.strokeStyle = "#2dd4bf";
      ctx.lineWidth = 3;
      ctx.stroke();
      
      ctx.fillStyle = "#2dd4bf";
      ctx.font = "bold 20px sans-serif";
      ctx.fillText("Muhib", 165, 340);
    }

    // --- DRAW MOVING MOUTH ---
    const openFactor = Math.min(1, Math.max(0, mouthOpen));
    const mouthHeight = 8 + openFactor * 14;
    const mouthYOffset = openFactor * 7;
    
    const leftX = face.mouthLeft.x;
    const rightX = face.mouthRight.x;
    const centerX = (leftX + rightX) / 2;
    const upperLipY = face.mouthTopBase - 2 + (openFactor * 2);
    const lowerLipY = face.mouthBottomBase + mouthYOffset;
    
    ctx.save();
    
    if (openFactor > 0.05) {
      ctx.beginPath();
      ctx.ellipse(centerX, (upperLipY + lowerLipY) / 2, (rightX - leftX) / 2.2, mouthHeight / 1.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(40, 10, 8, ${0.7 + openFactor * 0.3})`;
      ctx.fill();
      
      if (openFactor > 0.3) {
        ctx.beginPath();
        ctx.rect(centerX - 14, upperLipY + 2, 28, 6);
        ctx.fillStyle = `rgba(245, 235, 210, ${(openFactor - 0.3) * 1.2})`;
        ctx.fill();
      }
    }
    
    // Lips
    ctx.beginPath();
    ctx.moveTo(leftX, face.mouthLeft.y);
    ctx.quadraticCurveTo(centerX - 8, upperLipY - 3, centerX, upperLipY - 2);
    ctx.quadraticCurveTo(centerX + 8, upperLipY - 3, rightX, face.mouthRight.y);
    ctx.fillStyle = "#b87a68";
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(leftX, face.mouthLeft.y);
    ctx.quadraticCurveTo(centerX - 8, lowerLipY + 2, centerX, lowerLipY + 4);
    ctx.quadraticCurveTo(centerX + 8, lowerLipY + 2, rightX, face.mouthRight.y);
    ctx.fillStyle = "#ac6e5a";
    ctx.fill();
    
    ctx.restore();

    // --- EYE BLINK ---
    if (blinkState > 0.05) {
      const blinkIntensity = Math.min(1, blinkState * 1.5);
      ctx.fillStyle = `rgba(80, 65, 55, ${0.9})`;
      ctx.beginPath();
      ctx.ellipse(face.leftEye.x, face.leftEye.y, face.leftEye.w/1.8, face.leftEye.h/1.5 * (0.2 + blinkIntensity), 0, 0, 2*Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(face.rightEye.x, face.rightEye.y, face.rightEye.w/1.8, face.rightEye.h/1.5 * (0.2 + blinkIntensity), 0, 0, 2*Math.PI);
      ctx.fill();
    }
    
    requestAnimationFrame(drawAvatar);
  }
  
  function updateMouth() {
    if (isSpeakingAnim) {
      targetMouth = 0.4 + Math.random() * 0.55;
    } else {
      targetMouth = 0;
    }
    mouthOpen += (targetMouth - mouthOpen) * 0.3;
    requestAnimationFrame(updateMouth);
  }
  updateMouth();
  
  // Random blink
  function randomBlink() {
    setInterval(() => {
      blinkState = 1;
      setTimeout(() => { blinkState = 0; }, 120);
    }, 2800 + Math.random() * 2500);
  }
  randomBlink();
  
  photo.onload = () => drawAvatar();
  drawAvatar();
  
  // ============================================================
  // 2. VOICE + SMART RESPONSES (FULLY WORKING, NO API NEEDED)
  // ============================================================
  
  let isSpeaking = false;
  let isListening = false;
  let isThinking = false;
  let recognition = null;
  let synth = window.speechSynthesis;
  let conversationHistory = [];
  
  // Muhib's knowledge base (fully local, works offline)
  const muhibKnowledge = {
    intro: "Hey! I'm Muhib Ullah — a Data Analyst and Automation Engineer based in Islamabad. I'm in my final year of CS at NUML, graduating in 2026 with a 3.4 CGPA. I love building automation tools and data pipelines!",
    skills: "My tech stack includes SQL, Python with Pandas and Scikit-learn, Power BI for dashboards, n8n for automation, and I also work with Databricks, NLP, and web scraping. I'm really passionate about n8n workflows!",
    automation: "I've built several automation projects! My Sales Outreach Automation using n8n, Python, and Outlook API helped close 3 deals in 3 months. I'm also working on AI Calling Agents with Vapi and LinkedIn outreach automation. These automations have reduced manual work by over 70% in many cases.",
    bestProject: "My best project? I'd say the Sales Outreach Automation that actually helped close real deals. Also proud of 'Meat Inspector Lens' — my FYP that uses computer vision and IoT to detect meat type and freshness. But honestly, I love all my automation work!",
    openToWork: "Absolutely! I'm open to full-time roles in Data Analytics or Automation Engineering starting mid-2026. I'm also available for freelance automation projects. You can reach me at muhibajaz333@gmail.com or on LinkedIn at muhibajaz01. I usually respond within 3 hours!",
    currentJob: "Currently I'm working as a Data Analyst & Automation Engineer at IP Global since September 2025. I handle SQL queries, ETL pipelines, n8n automation, Power BI dashboards, and even Vapi AI calling agents. It's been an amazing learning experience!",
    pastExperience: "I interned at 10Pearls as a Data Science Intern where I worked on environmental data pipelines and predictive models. Before that, I was at Sarmaya Financials as a Data Analyst Intern, building Power BI dashboards for live stock and AUM data.",
    contact: "You can email me at muhibajaz333@gmail.com, find me on LinkedIn as muhibajaz01, or check my GitHub at MuhibAjaz. I'd love to connect!",
    about: "I'm Muhib Ullah, a Data Analyst & Automation Engineer from Islamabad. I'm passionate about using automation to solve real problems. Whether it's n8n workflows, Python scripts, or AI agents — I love making things work efficiently!"
  };
  
  function getSmartResponse(question) {
    const q = question.toLowerCase();
    
    // Greetings
    if (q.match(/hi|hello|hey|assalam|salam/)) {
      return "Hey there! Great to talk to you. What would you like to know about my work in automation or data analytics?";
    }
    
    // About / intro
    if (q.match(/who are you|introduce|tell me about yourself|yourself/)) {
      return muhibKnowledge.intro;
    }
    
    // Skills / tech stack
    if (q.match(/skills|tech stack|technologies|what do you use|tools/)) {
      return muhibKnowledge.skills;
    }
    
    // Automation projects
    if (q.match(/automation|automate|n8n|workflow|outreach|sales/)) {
      return muhibKnowledge.automation;
    }
    
    // Best project
    if (q.match(/best project|favorite project|proud|showcase|portfolio/)) {
      return muhibKnowledge.bestProject;
    }
    
    // Open to work / hire
    if (q.match(/open to work|hire|job|position|opportunity|freelance|contract/)) {
      return muhibKnowledge.openToWork;
    }
    
    // Current job / IP Global
    if (q.match(/ip global|current job|what do you do now|present role/)) {
      return muhibKnowledge.currentJob;
    }
    
    // Past experience / internships
    if (q.match(/experience|intern|past|previous|10pearls|sarmaya/)) {
      return muhibKnowledge.pastExperience;
    }
    
    // Contact
    if (q.match(/contact|email|linkedin|github|reach you|how to contact/)) {
      return muhibKnowledge.contact;
    }
    
    // FYP / Meat Inspector
    if (q.match(/fyp|final year|meat inspector|lens|computer vision|iot/)) {
      return "My Final Year Project is 'Meat Inspector Lens' — it's an AI application that uses computer vision and IoT sensors to detect meat type and freshness. It's been challenging but really exciting to work on!";
    }
    
    // SQL / databases
    if (q.match(/sql|database|query|etl/)) {
      return "I work extensively with SQL for data extraction and ETL pipelines. At IP Global, I write complex queries daily and optimize database performance. It's one of my strongest skills!";
    }
    
    // Power BI
    if (q.match(/power bi|dashboard|visualization|bi|dax/)) {
      return "Power BI is my go-to for dashboards! I've built many interactive reports using DAX and Power Query. At Sarmaya Financials, I created dashboards for live stock data that helped the team make better decisions faster.";
    }
    
    // Python
    if (q.match(/python|pandas|scikit|data science/)) {
      return "Python is my main language for data analysis and automation. I use Pandas for data manipulation, Scikit-learn for ML models, and I've built several automation scripts for web scraping and data processing.";
    }
    
    // Default / fallback
    return "That's a great question! I'm a Data Analyst and Automation Engineer based in Islamabad. Could you be more specific? I'd love to tell you about my work in automation, my tech stack with Python and SQL, my Power BI dashboards, or my experience at IP Global and 10Pearls.";
  }
  
  // UI Elements
  const chatBox = document.getElementById('chatBox');
  const statusDot = document.getElementById('statusDot');
  const statusTextSpan = document.getElementById('statusText');
  const talkBtn = document.getElementById('talkBtn');
  const talkLabel = document.getElementById('talkLabel');
  const avatarRing = document.getElementById('avatarRing');
  const waveSpans = document.querySelectorAll('.wave-group span');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const micError = document.getElementById('micError');
  
  function addMessage(role, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    msgDiv.innerHTML = `<div class="msg-label">${role === 'user' ? 'You' : 'Muhib'}</div><div class="bubble">${text}</div>`;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  
  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot';
    typingDiv.id = 'typingMsg';
    typingDiv.innerHTML = `<div class="msg-label">Muhib</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    chatBox.appendChild(typingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  
  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }
  
  function setStatus(status, mode) {
    statusTextSpan.innerText = status;
    statusDot.className = `dot ${mode ? 'active-' + mode : ''}`;
  }
  
  function startWaveAnimation() {
    const interval = setInterval(() => {
      if (isSpeaking) {
        waveSpans.forEach(span => {
          const h = 4 + Math.random() * 16;
          span.style.height = h + 'px';
        });
      }
    }, 70);
    window.waveInterval = interval;
  }
  
  function stopWaveAnimation() {
    if (window.waveInterval) clearInterval(window.waveInterval);
    waveSpans.forEach(span => span.style.height = '6px');
  }
  
  function speakText(text) {
    if (synth.speaking) synth.cancel();
    
    isSpeakingAnim = true;
    isSpeaking = true;
    avatarRing.classList.add('speaking');
    setStatus("Speaking...", "speaking");
    startWaveAnimation();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.92;
    utterance.pitch = 0.94;
    
    // Try to get a good voice
    const voices = synth.getVoices();
    const preferredVoice = voices.find(v => 
      v.name.includes('Google UK English Male') || 
      v.name.includes('Google US English') ||
      v.name.includes('Microsoft David') ||
      v.lang === 'en-US'
    );
    if (preferredVoice) utterance.voice = preferredVoice;
    
    utterance.onend = () => {
      isSpeakingAnim = false;
      isSpeaking = false;
      avatarRing.classList.remove('speaking');
      setStatus("Ready", "");
      stopWaveAnimation();
    };
    
    utterance.onerror = () => {
      isSpeakingAnim = false;
      isSpeaking = false;
      avatarRing.classList.remove('speaking');
      stopWaveAnimation();
    };
    
    synth.speak(utterance);
  }
  
  function handleQuery(question) {
    if (isThinking || isSpeaking) return;
    addMessage('user', question);
    conversationHistory.push({ role: 'user', content: question });
    
    isThinking = true;
    setStatus("Thinking...", "thinking");
    showTyping();
    
    // Simulate thinking time (like real AI response)
    setTimeout(() => {
      const reply = getSmartResponse(question);
      conversationHistory.push({ role: 'assistant', content: reply });
      removeTyping();
      addMessage('bot', reply);
      isThinking = false;
      speakText(reply);
    }, 300 + Math.random() * 300);
  }
  
  // Voice Recognition
  function initSpeechRecognition() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      micError.style.display = 'block';
      talkBtn.disabled = true;
      talkLabel.textContent = 'Voice not supported';
      return false;
    }
    
    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognitionAPI();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    
    recognition.onstart = () => {
      isListening = true;
      talkBtn.classList.add('recording');
      talkLabel.innerText = 'Listening... Stop talking';
      setStatus("Listening...", "listening");
    };
    
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      stopListening();
      if (transcript && transcript.trim()) {
        handleQuery(transcript.trim());
      }
    };
    
    recognition.onerror = (event) => {
      console.error('Recognition error:', event.error);
      stopListening();
      if (event.error === 'not-allowed') {
        micError.style.display = 'block';
        talkBtn.disabled = true;
      } else if (event.error !== 'no-speech') {
        setStatus("Try again", "");
      }
    };
    
    recognition.onend = () => {
      if (isListening) stopListening();
    };
    
    return true;
  }
  
  function startListening() {
    if (isSpeaking) {
      // Stop speaking and listen instead
      synth.cancel();
      isSpeaking = false;
      isSpeakingAnim = false;
      avatarRing.classList.remove('speaking');
      stopWaveAnimation();
    }
    
    if (isThinking) return;
    
    if (!recognition) {
      if (!initSpeechRecognition()) return;
    }
    
    try {
      recognition.start();
    } catch(e) {
      console.log('Restarting recognition...');
      initSpeechRecognition();
      try { recognition.start(); } catch(err) {}
    }
  }
  
  function stopListening() {
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
    }
    isListening = false;
    talkBtn.classList.remove('recording');
    talkLabel.innerText = 'Click to Talk';
    if (!isSpeaking && !isThinking) setStatus("Ready", "");
  }
  
  function toggleListen() {
    if (isSpeaking) {
      synth.cancel();
      isSpeaking = false;
      isSpeakingAnim = false;
      avatarRing.classList.remove('speaking');
      stopWaveAnimation();
      setStatus("Ready", "");
      return;
    }
    
    if (isListening) {
      stopListening();
    } else {
      startListening();
    }
  }
  
  // Initialize
  initSpeechRecognition();
  
  // Event bindings
  talkBtn.addEventListener('click', toggleListen);
  sendBtn.addEventListener('click', () => {
    const txt = textInput.value.trim();
    if (txt) {
      textInput.value = '';
      handleQuery(txt);
    }
  });
  textInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });
  document.querySelectorAll('.sug-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      handleQuery(chip.getAttribute('data-q') || chip.innerText);
    });
  });
  
  // Welcome greeting after page loads
  setTimeout(() => {
    const greeting = "Hey! I'm Muhib Ullah. Click the talk button and speak to me like a video call — I'll respond naturally! What would you like to know about my work?";
    addMessage('bot', greeting);
    // Don't auto-speak to avoid unexpected noise - user can click talk
  }, 800);
  
  setStatus("Ready", "");
</script>
</body>
</html>
